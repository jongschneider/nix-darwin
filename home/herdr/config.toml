[keys]
next_workspace = "prefix+shift+j"
previous_workspace = "prefix+shift+k"
next_agent = "prefix+shift+h"
previous_agent = "prefix+shift+l"

[[keys.command]]
key = "prefix+t"
type = "pane"
command = "~/.config/herdr/session-picker.sh"
description = "session picker (fzf + zoxide)"

[[keys.command]]
key = "ctrl+h"
type = "plugin_action"
command = "vim-herdr-navigation.left"
description = "navigate left (vim/herdr)"

[[keys.command]]
key = "ctrl+j"
type = "plugin_action"
command = "vim-herdr-navigation.down"
description = "navigate down (vim/herdr)"

[[keys.command]]
key = "ctrl+k"
type = "plugin_action"
command = "vim-herdr-navigation.up"
description = "navigate up (vim/herdr)"

[[keys.command]]
key = "ctrl+l"
type = "plugin_action"
command = "vim-herdr-navigation.right"
description = "navigate right (vim/herdr)"

[ui.toast]
delivery = "terminal"

[ui]
show_agent_labels_on_pane_borders = true
agent_panel_sort = "spaces"

[experimental]
pane_history = false
# Render child Kitty graphics (e.g. yazi image previews) onto the outer terminal.
kitty_graphics = true

[theme]
name = "catppuccin"
auto_switch = false
